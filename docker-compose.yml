services:
  db:
    image: postgres:16
    container_name: studynode-db
    environment:
      POSTGRES_USER: studynode
      POSTGRES_PASSWORD: studynode
      POSTGRES_DB: studynode_dev
    ports:
      - "5432:5432"
    volumes:
      - studynode_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studynode -d studynode_dev"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  studynode_pg:
